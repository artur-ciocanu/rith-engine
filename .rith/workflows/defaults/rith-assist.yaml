name: rith-assist
description: |
  Use when: No other workflow matches the request.
  Handles: Questions, debugging, exploration, one-off tasks, explanations, CI failures, general help.
  Capability: Full agent with all tools available.
  Note: Will inform user when assist mode is used for tracking.

# Run in the live checkout, not in a fresh sub-worktree. Without this, every
# auto-routed `rith-assist` invocation creates an isolated sub-worktree
# whose edits are unreachable from the calling chat (no commit step, no
# branch propagation back). With `worktree.enabled: false`, edits land in
# the parent's working tree where syncWorkspace's #1516 fast-forward
# default keeps them safe across chat ticks. Closes #1546.
worktree:
  enabled: false

nodes:
  - id: assist
    prompt: |
      # Assist Mode

      **Request**: $ARGUMENTS

      You are helping with a request that didn't match a specific workflow.

      ## Instructions

      1. **Understand the request** — What is the user actually asking for?
      2. **Take action** — Use your full agent capabilities to help
      3. **Be helpful** — Answer questions, debug issues, explore code, make changes
      4. **Note the gap** — If this should have been a specific workflow, mention it:
         "Note: Using assist mode. Consider creating a workflow for this use case."

      ## Capabilities

      - Read and write files
      - Run commands
      - Search the codebase
      - Make code changes
      - Answer questions

      ## Request

      $ARGUMENTS

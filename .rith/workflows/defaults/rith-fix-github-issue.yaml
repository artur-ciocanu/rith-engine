name: rith-fix-github-issue
description: |
  Use when: User wants to FIX, RESOLVE, or IMPLEMENT a solution for a GitHub issue.
  Triggers: "fix this issue", "implement issue #123", "resolve this bug", "fix it",
            "fix issue", "resolve issue", "fix #123".
  NOT for: Comprehensive multi-agent reviews (use rith-issue-review-full),
           questions about issues, CI failures, PR reviews, general exploration.

  DAG workflow that:
  1. Classifies the issue (bug/feature/enhancement/etc)
  2. Researches context (web research + codebase exploration via investigate/plan)
  3. Routes to investigate (bugs) or plan (features) based on classification
  4. Implements the fix/feature with validation
  5. Creates a draft PR using the repo's PR template
  6. Runs smart review (always code review + CLAUDE.md check, conditional additional agents)
  7. Aggressively self-fixes all findings (tests, docs, error handling)
  8. Simplifies changed code (implements fixes directly, not just reports)
  9. Reports results back to the GitHub issue with follow-up suggestions

model: anthropic/claude-sonnet-4-5

nodes:
  # ═══════════════════════════════════════════════════════════════
  # PHASE 1: FETCH & CLASSIFY
  # ═══════════════════════════════════════════════════════════════

  - id: extract-issue-number
    prompt: |
      Find the GitHub issue number for this request.

      Request: $ARGUMENTS

      Rules:
      - If the message contains an explicit issue number (e.g., "#709", "issue 709", "709"), extract that number.
      - If the message is ambiguous (e.g., "fix the SQLite timestamp bug"), use `gh issue list` to search for matching issues and pick the best match.

      CRITICAL: Your final output must be ONLY the bare number with no quotes, no markdown, no explanation. Example correct output: 709

  - id: fetch-issue
    bash: |
      # Strip quotes, whitespace, markdown backticks from AI output
      ISSUE_NUM=$(echo "$extract-issue-number.output" | tr -d "'\"\`\n " | grep -oE '[0-9]+' | head -1)
      if [ -z "$ISSUE_NUM" ]; then
        echo "Failed to extract issue number from: $extract-issue-number.output" >&2
        exit 1
      fi
      gh issue view "$ISSUE_NUM" --json title,body,labels,comments,state,url,author
    depends_on: [extract-issue-number]

  - id: classify
    prompt: |
      You are an issue classifier. Analyze the GitHub issue below and determine its type.

      ## Issue Content

      $fetch-issue.output

      ## Classification Rules

      | Type | Indicators |
      |------|------------|
      | bug | "broken", "error", "crash", "doesn't work", stack traces, regression |
      | feature | "add", "new", "support", "would be nice", net-new capability |
      | enhancement | "improve", "better", "update existing", "extend", incremental improvement |
      | refactor | "clean up", "simplify", "reorganize", "restructure" |
      | chore | "update deps", "upgrade", "maintenance", "CI/CD" |
      | documentation | "docs", "readme", "clarify", "examples" |

      Provide reasoning for your classification.
    depends_on: [fetch-issue]
    model: anthropic/claude-haiku-4-5
    allowed_tools: []
    output_format:
      type: object
      properties:
        issue_type:
          type: string
          enum: ["bug", "feature", "enhancement", "refactor", "chore", "documentation"]
        title:
          type: string
        reasoning:
          type: string
      required: [issue_type, title, reasoning]

  # ═══════════════════════════════════════════════════════════════
  # PHASE 2: RESEARCH (parallel with PR template fetch)
  # ═══════════════════════════════════════════════════════════════

  - id: web-research
    prompt: |
      # Web Research

      **Input**: $ARGUMENTS
      **Workflow ID**: $WORKFLOW_ID

      ---

      ## Your Mission

      Search the web for information relevant to the issue or feature being worked on. Find official documentation, known issues, best practices, and solutions that will inform implementation.

      **Output**: `$ARTIFACTS_DIR/web-research.md`

      **Core Principle**: Search strategically, prioritize authoritative sources, cite everything.

      ---

      ## Phase 1: PARSE - Understand What to Research

      ### 1.1 Get Issue Context

      If input looks like a GitHub issue number:

      ```bash
      gh issue view $ARGUMENTS --json title,body,labels
      ```

      ### 1.2 Identify Research Targets

      From the issue context, identify:

      - Key technologies, libraries, or APIs mentioned
      - Error messages or stack traces to search for
      - Concepts or patterns that need clarification
      - Version-specific documentation needs
      - Existing primitives in the ecosystem — what built-in or library-level abstractions already solve part of this? (avoids reinventing)

      ### 1.3 Formulate Search Plan

      Create 3-5 targeted search queries:

      | Query                                    | Why                | Expected Source                            |
      | ---------------------------------------- | ------------------ | ------------------------------------------ |
      | "{library} {feature} documentation"      | Official docs      | Library website                            |
      | "{error message}"                        | Known issues       | Stack Overflow, GitHub issues              |
      | "{pattern} best practices {year}"        | Current approaches | Blog posts, docs                           |
      | "{library} built-in {primitive/feature}" | Avoid reinventing  | Official docs, changelog, migration guides |

      **PHASE_1_CHECKPOINT:**

      - [ ] Issue context understood
      - [ ] Research targets identified
      - [ ] Search queries formulated

      ---

      ## Phase 2: SEARCH - Execute Research

      ### 2.1 Check for llms.txt

      Many sites publish LLM-optimized documentation:

      ```
      Try fetching https://{domain}/llms.txt for any known site
      Read the result and fetch relevant sub-pages linked within
      ```

      ### 2.2 Search Official Documentation

      For each technology/library involved:

      1. Search for official docs with version constraints
      2. Use `site:` operator for known authoritative sources
      3. Look for changelog/release notes for version info

      ### 2.3 Search for Known Issues

      If the issue involves errors or bugs:

      1. Search exact error messages in quotes
      2. Check GitHub issues for the relevant libraries
      3. Look for Stack Overflow answers

      ### 2.4 Search for Best Practices

      If the issue involves implementation decisions:

      1. Search for recognized patterns and approaches
      2. Cross-reference multiple sources
      3. Look for migration guides if changing approaches

      **PHASE_2_CHECKPOINT:**

      - [ ] At least 3 searches executed
      - [ ] Authoritative sources found
      - [ ] Relevant content extracted

      ---

      ## Phase 3: SYNTHESIZE - Compile Findings

      ### 3.1 Organize by Relevance

      For each finding:

      - **Source**: Name and URL
      - **Authority**: Why this source is credible
      - **Key information**: Direct quotes or specific facts
      - **Applies to**: Which part of the issue this informs
      - **Version/date**: Currency of the information

      ### 3.2 Identify Conflicts or Gaps

      - Note any conflicting information between sources
      - Flag outdated content
      - Document what could NOT be found

      **PHASE_3_CHECKPOINT:**

      - [ ] Findings organized
      - [ ] Conflicts noted
      - [ ] Gaps documented

      ---

      ## Phase 4: GENERATE - Write Artifact

      Write to `$ARTIFACTS_DIR/web-research.md`:

      ````markdown
      # Web Research: $ARGUMENTS

      **Researched**: {ISO timestamp}
      **Workflow ID**: $WORKFLOW_ID

      ---

      ## Summary

      {2-3 sentence overview of key findings}

      ---

      ## Findings

      ### {Source/Topic 1}

      **Source**: [{Name}]({URL})
      **Authority**: {Why credible}
      **Relevant to**: {Which part of the issue}

      **Key Information**:

      - {Finding 1}
      - {Finding 2}
      - {Version/date context}

      ---

      ### {Source/Topic 2}

      {Same structure...}

      ---

      ## Code Examples

      {If applicable — actual code from sources with attribution}

      ```language
      // From [{source}]({url})
      {code example}
      ```
      ````

      ---

      ## Gaps and Conflicts

      - {Information that couldn't be found}
      - {Conflicting claims between sources}
      - {Areas needing further investigation}

      ---

      ## Recommendations

      Based on research:

      1. {Recommendation 1 — what approach to take and why}
      2. {Recommendation 2 — what to avoid and why}

      ---

      ## Sources

      | #   | Source | URL   | Relevance         |
      | --- | ------ | ----- | ----------------- |
      | 1   | {name} | {url} | {brief relevance} |
      | 2   | {name} | {url} | {brief relevance} |

      **PHASE_4_CHECKPOINT:**

      - [ ] Artifact written to `$ARTIFACTS_DIR/web-research.md`
      - [ ] All sources cited with URLs
      - [ ] Recommendations actionable

      ---

      ## Phase 5: OUTPUT - Report

      ```markdown
      ## Web Research Complete

      **Queries**: {n} searches executed
      **Sources**: {n} relevant sources found
      **Artifact**: `$ARTIFACTS_DIR/web-research.md`

      ### Key Findings

      - {Finding 1}
      - {Finding 2}
      - {Finding 3}

      ### Gaps

      - {What couldn't be found, if any}
      ```

      ---

      ## Quality Standards

      | Standard         | Requirement                                   |
      | ---------------- | --------------------------------------------- |
      | **Accuracy**     | Quote sources exactly, provide direct links   |
      | **Relevance**    | Focus on what directly addresses the issue    |
      | **Currency**     | Note publication dates and versions           |
      | **Authority**    | Prioritize official docs, recognized experts  |
      | **Completeness** | Search multiple angles, note gaps             |
      | **Transparency** | Flag outdated, conflicting, or uncertain info |

      ---

      ## What NOT To Do

      - Don't guess when you can search
      - Don't fetch pages without checking search results first
      - Don't ignore publication dates on technical content
      - Don't present a single source as definitive without corroboration
      - Don't skip the Gaps section — be honest about limitations

      ---

      ## Success Criteria

      - **RESEARCH_EXECUTED**: At least 3 targeted searches completed
      - **SOURCES_CITED**: All findings have source URLs
      - **ARTIFACT_WRITTEN**: Research saved to `$ARTIFACTS_DIR/web-research.md`
      - **ACTIONABLE**: Findings directly inform implementation decisions
    depends_on: [classify]
    context: fresh

  # ═══════════════════════════════════════════════════════════════
  # PHASE 3: INVESTIGATE (bugs) / PLAN (features)
  # ═══════════════════════════════════════════════════════════════

  - id: investigate
    skills: [rith-investigate-issue]
    depends_on: [classify, web-research]
    when: "$classify.output.issue_type == 'bug'"
    context: fresh

  - id: plan
    skills: [rith-create-plan]
    depends_on: [classify, web-research]
    when: "$classify.output.issue_type != 'bug'"
    context: fresh

  # Bridge: ensure investigation.md exists for the implement step
  # rith-fix-issue reads from $ARTIFACTS_DIR/investigation.md
  # rith-create-plan writes to $ARTIFACTS_DIR/plan.md
  # This node copies plan.md → investigation.md when the plan path was taken
  - id: bridge-artifacts
    bash: |
      if [ -f "$ARTIFACTS_DIR/plan.md" ] && [ ! -f "$ARTIFACTS_DIR/investigation.md" ]; then
        cp "$ARTIFACTS_DIR/plan.md" "$ARTIFACTS_DIR/investigation.md"
        echo "Bridged plan.md to investigation.md for implement step"
      elif [ -f "$ARTIFACTS_DIR/investigation.md" ]; then
        echo "investigation.md exists from investigate step"
      else
        echo "WARNING: No investigation.md or plan.md found — implement may fail"
      fi
    depends_on: [investigate, plan]
    trigger_rule: one_success

  # ═══════════════════════════════════════════════════════════════
  # PHASE 4: IMPLEMENT
  # ═══════════════════════════════════════════════════════════════

  - id: implement
    skills: [rith-fix-issue]
    depends_on: [bridge-artifacts]
    context: fresh
    model: anthropic/claude-opus-4-5

  # ═══════════════════════════════════════════════════════════════
  # PHASE 5: VALIDATE
  # ═══════════════════════════════════════════════════════════════

  - id: validate
    skills: [rith-validate]
    depends_on: [implement]
    context: fresh

  # ═══════════════════════════════════════════════════════════════
  # PHASE 6: CREATE DRAFT PR
  # ═══════════════════════════════════════════════════════════════

  - id: create-pr
    prompt: |
      Create a draft pull request for the current branch.

      ## Context

      - **Issue**: $ARGUMENTS
      - **Classification**: $classify.output
      - **Issue title**: $classify.output.title

      ## Instructions

      1. Check git status. If uncommitted changes exist, stage and commit ONLY source files that are part of the fix:
         - List them by name with `git add <path1> <path2> ...` — never `git add -A`, `git add .`, or `git add -u`
         - **Never commit** scratch / review / PR-body artifacts, even if they appear in `git status`:
           - `.pr-body.md`, `pr-body.md`, `*.scratch.md`, `*.tmp.md` at any path
           - `review/`, `*-report.md` at the repo root
           - Anything under `$ARTIFACTS_DIR`
         - Verify with `git status --porcelain` that nothing scratch is staged before committing
         - If files you don't recognize as part of the fix appear modified or untracked, leave them alone
      2. Push the branch: `git push -u origin HEAD`
      3. Read implementation artifacts from `$ARTIFACTS_DIR/` for context:
         - `$ARTIFACTS_DIR/investigation.md` or `$ARTIFACTS_DIR/plan.md`
         - `$ARTIFACTS_DIR/implementation.md`
         - `$ARTIFACTS_DIR/validation.md`
      4. Check if a PR already exists for this branch: `gh pr list --head $(git branch --show-current)`
         - If PR exists, skip creation and capture its number
      5. Look for the project's PR template at `.github/pull_request_template.md`, `.github/PULL_REQUEST_TEMPLATE.md`, or `docs/PULL_REQUEST_TEMPLATE.md`. Read whichever one exists.
      6. Create a DRAFT PR: `gh pr create --draft --base $BASE_BRANCH`
         - Title: concise, imperative mood, under 70 chars
         - Body: if a PR template was found, fill in **every section** with details from the artifacts. Don't skip sections or leave placeholders. If no template, write a body with summary, changes, validation evidence, and `Fixes #...`.
         - **PR body file location**: if you write the body to a file (e.g. for `--body-file`), the file MUST live at `$ARTIFACTS_DIR/pr-body.md` or under `/tmp/` — NEVER inside the worktree. Files like `.pr-body.md` at the repo root will be picked up by later commits.
         - Link to issue: include `Fixes #...` or `Closes #...`
      7. Capture PR identifiers:
         ```bash
         PR_NUMBER=$(gh pr view --json number -q '.number')
         echo "$PR_NUMBER" > "$ARTIFACTS_DIR/.pr-number"
         PR_URL=$(gh pr view --json url -q '.url')
         echo "$PR_URL" > "$ARTIFACTS_DIR/.pr-url"
         ```
    depends_on: [validate]
    context: fresh

  # ═══════════════════════════════════════════════════════════════
  # PHASE 7: REVIEW
  # ═══════════════════════════════════════════════════════════════

  - id: verify-pr-base
    bash: |
      set -euo pipefail
      EXPECTED="$BASE_BRANCH"
      ACTUAL=$(gh pr view --json baseRefName -q '.baseRefName')
      if [ "$ACTUAL" != "$EXPECTED" ]; then
        PR_NUMBER=$(gh pr view --json number -q '.number')
        echo "Base mismatch on PR #$PR_NUMBER: expected=$EXPECTED actual=$ACTUAL — re-targeting" >&2
        gh pr edit "$PR_NUMBER" --base "$EXPECTED"
      else
        echo "PR base verified: $EXPECTED"
      fi
    depends_on: [create-pr]

  - id: review-scope-setup
    bash: |
      mkdir -p $ARTIFACTS_DIR/review
      if [ -f "$ARTIFACTS_DIR/.pr-number" ]; then
        PR_NUMBER=$(cat $ARTIFACTS_DIR/.pr-number | tr -d '\n' | tr -d ' ')
        echo "PR_NUMBER=$PR_NUMBER"
      else
        PR_NUMBER=$(gh pr view --json number -q '.number' 2>/dev/null)
        echo "$PR_NUMBER" > $ARTIFACTS_DIR/.pr-number
        echo "PR_NUMBER=$PR_NUMBER (from gh)"
      fi
      # Clean stale review artifacts
      find $ARTIFACTS_DIR/../reviews/pr-* -maxdepth 0 -mtime +7 -exec rm -rf {} \; 2>/dev/null || true
    depends_on: [verify-pr-base]

  - id: review-scope
    skills: [rith-pr-review-scope]
    prompt: |
      Assess reviewability and create scope manifest for the PR created by the fix workflow.
    depends_on: [review-scope-setup]
    context: fresh

  - id: review-classify
    prompt: |
      You are a PR review classifier. Analyze the PR scope and determine
      which review agents should run.

      ## PR Scope

      $review-scope.output

      ## Rules

      - **Code review**: ALWAYS run. This is mandatory for every PR. It also checks
        the PR against CLAUDE.md rules and project conventions.
      - **Error handling**: Run if the diff touches code with try/catch, error handling,
        async/await, or adds new failure paths.
      - **Test coverage**: Run if the diff touches source code (not just tests, docs, or config).
      - **Comment quality**: Run if the diff adds or modifies comments, docstrings, JSDoc,
        or significant documentation within code files.
      - **Docs impact**: Run if the diff adds/removes/renames public APIs, commands, CLI flags,
        environment variables, or user-facing features.

      Provide your reasoning for each decision.
    depends_on: [review-scope]
    model: anthropic/claude-haiku-4-5
    allowed_tools: []
    context: fresh
    output_format:
      type: object
      properties:
        run_code_review:
          type: string
          enum: ["true", "false"]
        run_error_handling:
          type: string
          enum: ["true", "false"]
        run_test_coverage:
          type: string
          enum: ["true", "false"]
        run_comment_quality:
          type: string
          enum: ["true", "false"]
        run_docs_impact:
          type: string
          enum: ["true", "false"]
        reasoning:
          type: string
      required:
        - run_code_review
        - run_error_handling
        - run_test_coverage
        - run_comment_quality
        - run_docs_impact
        - reasoning

  # Code review always runs — mandatory
  - id: code-review
    skills: [rith-code-review]
    depends_on: [review-classify]
    context: fresh

  - id: error-handling
    skills: [rith-error-handling-review]
    depends_on: [review-classify]
    when: "$review-classify.output.run_error_handling == 'true'"
    context: fresh

  - id: test-coverage
    skills: [rith-test-coverage-review]
    depends_on: [review-classify]
    when: "$review-classify.output.run_test_coverage == 'true'"
    context: fresh

  - id: comment-quality
    skills: [rith-comment-quality-review]
    depends_on: [review-classify]
    when: "$review-classify.output.run_comment_quality == 'true'"
    context: fresh

  - id: docs-impact
    skills: [rith-docs-impact-review]
    depends_on: [review-classify]
    when: "$review-classify.output.run_docs_impact == 'true'"
    context: fresh

  # ═══════════════════════════════════════════════════════════════
  # PHASE 8: SYNTHESIZE + SELF-FIX
  # ═══════════════════════════════════════════════════════════════

  - id: synthesize
    skills: [rith-synthesize-review]
    depends_on: [code-review, error-handling, test-coverage, comment-quality, docs-impact]
    trigger_rule: one_success
    context: fresh

  - id: self-fix
    skills: [rith-self-fix-all]
    depends_on: [synthesize]
    context: fresh

  # ═══════════════════════════════════════════════════════════════
  # PHASE 9: SIMPLIFY
  # ═══════════════════════════════════════════════════════════════

  - id: simplify
    prompt: |
      # Simplify Changed Code

      ---

      ## IMPORTANT: Output Behavior

      **Your output will be posted as a GitHub comment.** Keep working output minimal:

      - Do NOT narrate each step
      - Do NOT output verbose progress updates
      - Only output the final structured report at the end

      ---

      ## Your Mission

      Review ALL code changed on this branch and implement simplifications directly. You are not advisory — you edit files, validate, commit, and push.

      ## Scope

      **Only code changed in this PR** — run `git diff $BASE_BRANCH...HEAD --name-only` to get the file list. Do not touch unrelated files.

      ## What to Simplify

      | Opportunity                | What to Look For                                              |
      | -------------------------- | ------------------------------------------------------------- |
      | **Unnecessary complexity** | Deep nesting, convoluted logic paths                          |
      | **Redundant code**         | Duplicated logic, unused variables/imports                    |
      | **Over-abstraction**       | Abstractions that obscure rather than clarify                 |
      | **Poor naming**            | Unclear variable/function names                               |
      | **Nested ternaries**       | Multiple conditions in ternary chains — use if/else           |
      | **Dense one-liners**       | Compact code that sacrifices readability                      |
      | **Obvious comments**       | Comments that describe what code clearly shows                |
      | **Inconsistent patterns**  | Code that doesn't follow project conventions (read CLAUDE.md) |

      ## Rules

      - **Preserve exact functionality** — simplification must not change behavior
      - **Clarity over brevity** — readable beats compact
      - **No speculative refactors** — only simplify what's obviously improvable
      - **Follow project conventions** — read CLAUDE.md before making changes
      - **Small, obvious changes** — each simplification should be self-evidently correct

      ## Process

      ### Phase 1: ANALYZE

      1. Read CLAUDE.md for project conventions
      2. Get changed files: `git diff $BASE_BRANCH...HEAD --name-only`
      3. Read each changed file
      4. Identify simplification opportunities per file

      ### Phase 2: IMPLEMENT

      For each simplification:

      1. Edit the file
      2. Run `bun run type-check` — if it fails, revert that change
      3. Run `bun run lint` — if it fails, fix or revert

      **Track every path you edit.** You will need this list in Phase 3 to stage only the files you touched.

      ### Phase 3: VALIDATE & COMMIT

      1. Run full validation: `bun run type-check && bun run lint`
      2. If simplifications were applied, stage **only** the files you edited in Phase 2 — never `git add -A`, `git add .`, or `git add -u`:
         ```bash
         # Stage by name, using the list you tracked in Phase 2
         git add path/to/file1.ts path/to/file2.ts
         # Verify nothing else snuck in
         git status --porcelain
         ```
      3. **Never stage** report, scratch, or PR-body artifacts, even if they show up as untracked or modified in the worktree:
         - Anything under `$ARTIFACTS_DIR` (the artifacts directory normally lives outside the worktree, but copies/symlinks may exist)
         - `review/`, `simplify-report.md`, `*-report.md` at the repo root
         - `.pr-body.md`, `pr-body.md`, `*.scratch.md`, `*.tmp.md`
         - If `git status --porcelain` shows files you don't recognize as part of your simplifications, leave them unstaged
      4. Commit and push only the staged source edits:
         ```bash
         git commit -m "simplify: reduce complexity in changed files"
         git push
         ```
      5. If no simplifications were applied, skip the commit entirely

      ### Phase 4: REPORT

      Write report to `$ARTIFACTS_DIR/review/simplify-report.md` and output:

      ```markdown
      ## Code Simplification Report

      ### Changes Made

      #### 1. [Brief Title]

      **File**: `path/to/file.ts:45-60`
      **Type**: Reduced nesting / Improved naming / Removed redundancy / etc.
      **Before**: [snippet]
      **After**: [snippet]

      ---

      ### Summary

      | Metric                  | Value       |
      | ----------------------- | ----------- |
      | Files analyzed          | X           |
      | Simplifications applied | Y           |
      | Net line change         | -N lines    |
      | Validation              | PASS / FAIL |

      ### No Changes Needed

      (If nothing to simplify, say so — "Code is already clean. No simplifications applied.")
      ```
    depends_on: [self-fix]
    context: fresh

  # ═══════════════════════════════════════════════════════════════
  # PHASE 10: REPORT
  # ═══════════════════════════════════════════════════════════════

  - id: report
    prompt: |
      # Issue Completion Report

      **Input**: $ARGUMENTS
      **Workflow ID**: $WORKFLOW_ID

      ---

      ## Your Mission

      Compile all workflow artifacts into a final report and post it to the original GitHub issue. Summarize what was done, what wasn't addressed (and why), and suggest follow-up issues if needed.

      **GitHub action**: Post completion report as a comment on the original issue
      **Output artifact**: `$ARTIFACTS_DIR/completion-report.md`

      ---

      ## Phase 1: LOAD — Gather All Artifacts

      ### 1.1 Get Issue Number

      Extract issue number from `$ARGUMENTS`:

      ```bash
      # $ARGUMENTS should be the issue number or URL
      echo "$ARGUMENTS"
      ```

      ### 1.2 Get PR Info

      ```bash
      PR_NUMBER=$(cat $ARTIFACTS_DIR/.pr-number 2>/dev/null || echo "unknown")
      PR_URL=$(cat $ARTIFACTS_DIR/.pr-url 2>/dev/null || echo "unknown")
      echo "PR: $PR_NUMBER ($PR_URL)"
      ```

      ### 1.3 Read All Available Artifacts

      Check for and read each artifact that may exist:

      ```bash
      # Investigation/Plan
      cat $ARTIFACTS_DIR/investigation.md 2>/dev/null
      cat $ARTIFACTS_DIR/plan.md 2>/dev/null

      # Implementation
      cat $ARTIFACTS_DIR/implementation.md 2>/dev/null

      # Web research
      cat $ARTIFACTS_DIR/web-research.md 2>/dev/null

      # Validation
      cat $ARTIFACTS_DIR/validation.md 2>/dev/null

      # Review artifacts
      ls $ARTIFACTS_DIR/review/ 2>/dev/null
      cat $ARTIFACTS_DIR/review/consolidated-review.md 2>/dev/null
      cat $ARTIFACTS_DIR/review/fix-report.md 2>/dev/null
      ```

      ### 1.4 Get Git Info

      ```bash
      git branch --show-current
      git log --oneline -5
      ```

      **PHASE_1_CHECKPOINT:**

      - [ ] Issue number identified
      - [ ] PR info loaded
      - [ ] All available artifacts read
      - [ ] Git state captured

      ---

      ## Phase 2: COMPILE — Build Report

      ### 2.1 Summarize What Was Done

      From the artifacts, compile:

      - **Classification**: What type of issue (bug/feature/etc)
      - **Investigation/Plan**: Key findings and approach
      - **Implementation**: What was changed, files modified
      - **Validation**: Test results, lint, type-check
      - **Review**: What was reviewed, findings count
      - **Self-fix**: What review findings were fixed

      ### 2.2 Identify Unaddressed Items

      From the fix report and consolidated review:

      - Findings that were SKIPPED (with reasons)
      - Findings that were BLOCKED (with reasons)
      - MEDIUM/LOW findings not auto-fixed
      - Any validation issues that persisted

      ### 2.3 Suggest Follow-up Issues

      For each unaddressed item, determine if it warrants a follow-up issue:

      | Item              | Warrants Issue? | Why      |
      | ----------------- | --------------- | -------- |
      | {skipped finding} | YES/NO          | {reason} |

      **PHASE_2_CHECKPOINT:**

      - [ ] Summary compiled
      - [ ] Unaddressed items identified
      - [ ] Follow-up suggestions prepared

      ---

      ## Phase 3: GENERATE — Write Artifact

      Write to `$ARTIFACTS_DIR/completion-report.md`:

      ```markdown
      # Completion Report: Issue $ARGUMENTS

      **Date**: {ISO timestamp}
      **Workflow ID**: $WORKFLOW_ID
      **PR**: #{pr-number} ({pr-url})

      ---

      ## Summary

      {3-5 sentence overview of the entire workflow execution}

      ---

      ## Classification


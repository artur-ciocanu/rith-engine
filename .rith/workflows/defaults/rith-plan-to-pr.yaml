name: rith-plan-to-pr
description: |
  Use when: You have an existing implementation plan and want to execute it end-to-end.
  Input: Path to a plan file ($ARTIFACTS_DIR/plan.md or .agents/plans/*.md)
  Output: PR ready for merge with comprehensive review completed

  Full workflow:
  1. Read plan, setup branch, extract scope limits
  2. Verify plan research is still valid
  3. Implement all tasks with type-checking
  4. Run full validation suite
  5. Create PR with template, mark ready
  6. Comprehensive code review (5 parallel agents with scope limit awareness)
  7. Synthesize and fix review findings
  8. Final summary with decision matrix -> GitHub comment + follow-up recommendations

  NOT for: Creating plans from scratch (use rith-idea-to-pr), quick fixes, standalone reviews.

nodes:
  # ═══════════════════════════════════════════════════════════════════
  # PHASE 1: SETUP
  # ═══════════════════════════════════════════════════════════════════

  - id: plan-setup
    bash: |
      set -euo pipefail

      # Locate plan file
      if [ -f "$ARTIFACTS_DIR/plan.md" ]; then
        PLAN_PATH="$ARTIFACTS_DIR/plan.md"
        echo "Using plan from workflow: $PLAN_PATH"
      elif [ -n "${ARGUMENTS:-}" ] && [ -f "${ARGUMENTS:-}" ]; then
        PLAN_PATH="$ARGUMENTS"
        echo "Using plan from arguments: $PLAN_PATH"
      else
        echo "ERROR: No plan found"
        exit 1
      fi

      echo "PLAN_PATH=$PLAN_PATH"

      # Git state
      git branch --show-current
      git status --porcelain
      git remote get-url origin
      gh repo view --json nameWithOwner -q .nameWithOwner

      # Fetch and sync
      git fetch origin
    prompt: |
      # Plan Setup

      **Plan**: $ARGUMENTS
      **Workflow ID**: $WORKFLOW_ID

      ---

      ## Your Mission

      Prepare everything needed for plan implementation:

      1. Read and parse the plan (including scope limits)
      2. Ensure we're on the correct branch
      3. Write a comprehensive context artifact for subsequent steps

      **This step does NOT implement anything** - it only sets up the environment.
      **This step does NOT create a PR** - that happens in `rith-finalize-pr` after implementation.

      ---

      ## Phase 1: LOAD - Read the Plan

      ### 1.1 Locate Plan File

      **Check in order:**

      1. **If `$ARGUMENTS` provided**: Use that path
      2. **If plan already in workflow artifacts**: Use `$ARTIFACTS_DIR/plan.md`

      ```bash
      # Check if plan was created by rith-create-plan in this workflow
      if [ -f "$ARTIFACTS_DIR/plan.md" ]; then
        PLAN_PATH="$ARTIFACTS_DIR/plan.md"
        echo "Using plan from workflow: $PLAN_PATH"
      elif [ -n "$ARGUMENTS" ] && [ -f "$ARGUMENTS" ]; then
        PLAN_PATH="$ARGUMENTS"
        echo "Using plan from arguments: $PLAN_PATH"
      else
        echo "ERROR: No plan found"
        exit 1
      fi
      ```

      ### 1.2 Load Plan File

      Read the plan file:

      ```bash
      cat $PLAN_PATH
      ```

      If `$ARGUMENTS` is a GitHub issue URL or number (e.g., `#123`), fetch the issue body instead.

      ### 1.3 Extract Key Information

      From the plan, identify and extract:

      | Field                           | Where to Find                                             | Example                     |
      | ------------------------------- | --------------------------------------------------------- | --------------------------- |
      | **Title**                       | First `#` heading or "Summary" section                    | "Discord Platform Adapter"  |
      | **Summary**                     | "Summary" or "Feature Description" section                | 1-2 sentence overview       |
      | **Files to Change**             | "Files to Change" or "Tasks" section                      | List of CREATE/UPDATE files |
      | **Validation Commands**         | "Validation Commands" or "Validation Strategy"            | `bun run type-check`, etc.  |
      | **Acceptance Criteria**         | "Acceptance Criteria" section                             | Checklist items             |
      | **NOT Building (Scope Limits)** | "NOT Building", "Scope Limits", or "Out of Scope" section | Explicit exclusions         |

      **CRITICAL**: The "NOT Building" section defines what is **intentionally excluded** from scope. This MUST be captured and passed to review agents so they don't flag intentional exclusions as bugs.

      ### 1.4 Derive Branch Name

      Create a branch name from the plan title:

      ```
      feature/{slug}
      ```

      Where `{slug}` is the title lowercased, spaces replaced with hyphens, max 50 chars.

      Examples:

      - "Discord Platform Adapter" → `feature/discord-platform-adapter`
      - "ESLint/Prettier Integration" → `feature/eslint-prettier-integration`

      **PHASE_1_CHECKPOINT:**

      - [ ] Plan file loaded and readable
      - [ ] Key information extracted
      - [ ] Branch name derived

      ---

      ## Phase 2: PREPARE - Git State

      ### 2.1 Check Current State

      ```bash
      git branch --show-current
      git status --porcelain
      git remote get-url origin
      ```

      ### 2.2 Determine Repository Info

      Extract owner/repo from the remote URL for PR creation:

      ```bash
      gh repo view --json nameWithOwner -q .nameWithOwner
      ```

      ### 2.3 Branch Decision

      Evaluate in order (first matching case wins):

      ```text
      ┌─ IN WORKTREE?
      │  └─ YES → Use current branch AS-IS. Do NOT switch branches. Do NOT create
      │           new branches. The isolation system has already set up the correct
      │           branch; any deviation operates on the wrong code.
      │           Log: "Using worktree branch: {name}"
      │
      ├─ ON $BASE_BRANCH? (main, master, or configured base branch)
      │  └─ Q: Working directory clean?
      │     ├─ YES → Create and checkout: `git checkout -b {branch-name}`
      │     │        (only applies outside a worktree — e.g., manual CLI usage)
      │     └─ NO  → STOP: "Uncommitted changes on $BASE_BRANCH. Stash or commit first."
      │
      └─ ON OTHER BRANCH?
         └─ Q: Does it match the expected branch for this plan?
            ├─ YES → Use it, log "Using existing branch: {name}"
            └─ NO  → STOP: "On branch {X}, expected {Y}. Switch branches or adjust plan."
      ```

      ### 2.4 Sync with Remote

      ```bash
      git fetch origin
      git rebase origin/$BASE_BRANCH || git merge origin/$BASE_BRANCH
      ```

      If conflicts occur, STOP with error: "Merge conflicts with $BASE_BRANCH. Resolve manually."

      ### 2.5 Push Branch (if commits exist)

      If there are commits on the branch:

      ```bash
      git push -u origin HEAD
      ```

      If no commits yet (fresh branch), skip push - it will happen after implementation.

      **PHASE_2_CHECKPOINT:**

      - [ ] On correct branch
      - [ ] No uncommitted changes
      - [ ] Up to date with base branch

      ---

      ## Phase 3: ARTIFACT - Write Context File

      ### 3.1 Create Artifact Directory

      ```bash

      ```

      ### 3.2 Write Context Artifact

      Write to `$ARTIFACTS_DIR/plan-context.md`:

      ````markdown
      # Plan Context

      **Generated**: {YYYY-MM-DD HH:MM}
      **Workflow ID**: $WORKFLOW_ID
      **Plan Source**: $ARGUMENTS

      ---

      ## Branch

      | Field      | Value         |
      | ---------- | ------------- |
      | **Branch** | {branch-name} |
      | **Base**   | {base-branch} |

      ---

      ## Plan Summary

      **Title**: {extracted-title}

      **Overview**: {1-2 sentence summary from plan}

      ---

      ## Files to Change

      {Copy the "Files to Change" table from the plan, or list extracted files}

      | File             | Action |
      | ---------------- | ------ |
      | `src/example.ts` | CREATE |
      | `src/other.ts`   | UPDATE |

      ---

      ## NOT Building (Scope Limits)

      **CRITICAL FOR REVIEWERS**: These items are **intentionally excluded** from scope. Do NOT flag them as bugs or missing features.

      {Copy from plan's "NOT Building", "Scope Limits", or "Out of Scope" section}

      - {Explicit exclusion 1 with rationale}
      - {Explicit exclusion 2 with rationale}

      {If no explicit exclusions in plan: "No explicit scope limits defined in plan."}

      ---

      ## Validation Commands

      {Copy from plan's "Validation Commands" section}

      ```bash
      bun run type-check
      bun run lint
      bun test
      bun run build
      ```
      ````

      ---

      ## Acceptance Criteria

      {Copy from plan's "Acceptance Criteria" section}

      - [ ] Criterion 1
      - [ ] Criterion 2
      - [ ] ...

      ---

      ## Patterns to Mirror

      {Copy key file references from plan's "Patterns to Mirror" section}

      | Pattern        | Source File      | Lines |
      | -------------- | ---------------- | ----- |
      | {pattern-name} | `src/example.ts` | 10-50 |

      ---

      ## Next Steps

      1. `rith-confirm-plan` - Verify patterns still exist
      2. `rith-implement-tasks` - Execute the plan
      3. `rith-validate` - Run full validation
      4. `rith-finalize-pr` - Create PR and mark ready

      ````

      **PHASE_3_CHECKPOINT:**

      - [ ] Artifact directory created
      - [ ] `plan-context.md` written with all sections
      - [ ] "NOT Building" section captured (even if empty)

      ---

      ## Phase 4: OUTPUT - Report to User

      ```markdown
      ## Plan Setup Complete

      **Plan**: `$ARGUMENTS`
      **Workflow ID**: `$WORKFLOW_ID`

      ### Branch

      | Field | Value |
      |-------|-------|
      | Branch | `{branch-name}` |
      | Base | `{base-branch}` |

      ### Plan Summary

      **{plan-title}**

      {1-2 sentence overview}

      ### Scope

      - {N} files to create
      - {M} files to update
      - {K} explicit exclusions captured

      ### Artifact

      Context written to: `$ARTIFACTS_DIR/plan-context.md`

      ### Next Step

      Proceed to `rith-confirm-plan` to verify the plan's research is still valid.
      ````

      ---

      ## Error Handling

      ### Plan File Not Found

      ```
      ❌ Plan not found: $ARGUMENTS

      Verify the path exists and try again.
      ```

      ### Uncommitted Changes on Base Branch

      ```
      ❌ Uncommitted changes on base branch

      Options:
      1. Stash changes: `git stash`
      2. Commit changes: `git add . && git commit -m "WIP"`
      3. Discard changes: `git checkout .`

      Then retry.
      ```

      ### Merge Conflicts

      ```
      ❌ Merge conflicts with $BASE_BRANCH

      Resolve conflicts manually:
      1. `git status` to see conflicts
      2. Edit conflicting files
      3. `git add <resolved-files>`
      4. `git rebase --continue`

      Then retry.
      ```

      ---

      ## Success Criteria

      - **PLAN_LOADED**: Plan file read and parsed
      - **SCOPE_LIMITS_CAPTURED**: "NOT Building" section extracted (even if empty)
      - **BRANCH_READY**: On correct branch, synced with base branch
      - **ARTIFACT_WRITTEN**: `plan-context.md` contains all required sections including scope limits

    context: fresh

  # ═══════════════════════════════════════════════════════════════════
  # PHASE 2: CONFIRM PLAN
  # ═══════════════════════════════════════════════════════════════════

  - id: confirm-plan
    skills: [rith-create-plan]
    prompt: |
      This is the plan confirmation step. Verify that the plan's research is still valid
      and patterns referenced in the plan still exist in the codebase.
      Use references/plan-confirmation.md for the confirmation process.
    depends_on: [plan-setup]
    context: fresh

  # ═══════════════════════════════════════════════════════════════════
  # PHASE 3: IMPLEMENT
  # ═══════════════════════════════════════════════════════════════════

  - id: implement-tasks
    skills: [rith-implement]
    prompt: |
      Execute task list only without full environment setup.
    depends_on: [confirm-plan]
    context: fresh
    model: anthropic/claude-opus-4-5

  # ═══════════════════════════════════════════════════════════════════
  # PHASE 4: VALIDATE
  # ═══════════════════════════════════════════════════════════════════

  - id: validate
    skills: [rith-validate]
    depends_on: [implement-tasks]
    context: fresh

  # ═══════════════════════════════════════════════════════════════════
  # PHASE 5: FINALIZE PR
  # ═══════════════════════════════════════════════════════════════════

  - id: finalize-pr
    skills: [rith-finalize-pr]
    depends_on: [validate]
    context: fresh

  # ═══════════════════════════════════════════════════════════════════
  # PHASE 6: CODE REVIEW
  # ═══════════════════════════════════════════════════════════════════

  - id: verify-pr-base
    bash: |
      set -euo pipefail
      EXPECTED="$BASE_BRANCH"
      ACTUAL=$(gh pr view --json baseRefName -q '.baseRefName')
      if [ "$ACTUAL" != "$EXPECTED" ]; then
        PR_NUMBER=$(gh pr view --json number -q '.number')
        echo "Base mismatch on PR #$PR_NUMBER: expected=$EXPECTED actual=$ACTUAL — re-targeting" >&2
        gh pr edit "$PR_NUMBER" --base "$EXPECTED"
      else
        echo "PR base verified: $EXPECTED"
      fi
    depends_on: [finalize-pr]

  - id: review-scope
    bash: |
      set -euo pipefail

      # Determine PR number
      if [ -f "$ARTIFACTS_DIR/.pr-number" ]; then
        PR_NUMBER=$(cat "$ARTIFACTS_DIR/.pr-number" | tr -d '\n' | tr -d ' ')
        if ! echo "$PR_NUMBER" | grep -qE '^[0-9]+$'; then
          PR_NUMBER=""
        fi
      fi

      if [ -z "${PR_NUMBER:-}" ] && [ -n "${ARGUMENTS:-}" ]; then
        PR_NUMBER=$(echo "$ARGUMENTS" | grep -oE '[0-9]+' | head -1)
      fi

      if [ -z "${PR_NUMBER:-}" ]; then
        PR_NUMBER=$(gh pr view --json number -q '.number' 2>/dev/null || true)
      fi

      if [ -z "${PR_NUMBER:-}" ]; then
        echo "ERROR: No PR number found"
        exit 1
      fi

      echo "$PR_NUMBER" > "$ARTIFACTS_DIR/.pr-number"
      echo "PR_NUMBER=$PR_NUMBER"

      # Create review artifacts directory
      mkdir -p "$ARTIFACTS_DIR/review"

      # Clean stale review artifacts
      find "$ARTIFACTS_DIR/../reviews/pr-"* -maxdepth 0 -mtime +7 -exec rm -rf {} \; 2>/dev/null || true
    prompt: |
      # PR Review Scope

      **Input**: $ARGUMENTS

      ---

      ## Your Mission

      Verify the PR is in a reviewable state, gather all context needed for the parallel review agents, and prepare the artifacts directory structure.

      ---

      ## Phase 1: IDENTIFY - Determine PR

      ### 1.1 Get PR Number

      ```bash
      if [ -f "$ARTIFACTS_DIR/.pr-number" ]; then
        PR_NUMBER=$(cat $ARTIFACTS_DIR/.pr-number | tr -d '\n' | tr -d ' ')
        if ! echo "$PR_NUMBER" | grep -qE '^[0-9]+$'; then
          PR_NUMBER=""
        fi
      fi

      # From arguments (standalone review)
      if [ -z "$PR_NUMBER" ] && [ -n "$ARGUMENTS" ]; then
        PR_NUMBER=$(echo "$ARGUMENTS" | grep -oE '[0-9]+' | head -1)
      fi

      # From current branch
      if [ -z "$PR_NUMBER" ]; then
        PR_NUMBER=$(gh pr view --json number -q '.number' 2>/dev/null)
      fi

      if [ -z "$PR_NUMBER" ]; then
        echo "ERROR: No PR number found"
        exit 1
      fi

      # Write to registry for downstream steps (if not already there)
      echo "$PR_NUMBER" > $ARTIFACTS_DIR/.pr-number
      ```

      ### 1.2 Fetch PR Details

      ```bash
      gh pr view {number} --json number,title,body,url,headRefName,baseRefName,files,additions,deletions,changedFiles,state,author,isDraft,mergeable,mergeStateStatus
      ```

      **Extract:**

      - PR number and title
      - Branch names (head → base)
      - Changed files list
      - Addition/deletion counts
      - Draft status
      - Mergeable status

      **PHASE_1_CHECKPOINT:**

      - [ ] PR number identified
      - [ ] PR is open (not merged/closed)
      - [ ] Basic metadata extracted

      ---

      ## Phase 2: VERIFY - Pre-Review Checks

      **Before launching review agents, verify the PR is in a reviewable state.**

      ### 2.1 Check for Merge Conflicts

      ```bash
      gh pr view {number} --json mergeable,mergeStateStatus --jq '.mergeable, .mergeStateStatus'
      ```

      | Status        | Action                                          |
      | ------------- | ----------------------------------------------- |
      | `MERGEABLE`   | Continue                                        |
      | `CONFLICTING` | **STOP** - Tell user to resolve conflicts first |
      | `UNKNOWN`     | Warn, continue (GitHub still calculating)       |

      **If conflicts exist:**

      ````markdown
      ❌ **Cannot review: PR has merge conflicts**

      Please resolve conflicts before requesting a review:

      ```bash
      git fetch origin {base}
      git rebase origin/{base}
      # Resolve conflicts
      git push --force-with-lease
      ```
      ````

      Then re-request the review.

      ````
      **Exit workflow if conflicts detected.**

      ### 2.2 Check CI Status

      ```bash
      gh pr checks {number} --json name,state,conclusion --jq '.[] | "\(.name): \(.state) (\(.conclusion // "pending"))"'
      ````

      | Status       | Action                                  |
      | ------------ | --------------------------------------- |
      | All passing  | Continue                                |
      | Some failing | Warn, continue (note in scope)          |
      | All failing  | Warn strongly, continue (note in scope) |
      | Pending      | Note, continue                          |

      **Flag CI status for review report.**

      ### 2.3 Check Behind Base

      ```bash
      # Get branch names
      PR_BASE=$(gh pr view {number} --json baseRefName --jq '.baseRefName')
      PR_HEAD=$(gh pr view {number} --json headRefName --jq '.headRefName')

      # Fetch and count
      git fetch origin $PR_BASE --quiet
      git fetch origin $PR_HEAD --quiet

      # Commits behind base branch
      BEHIND=$(git rev-list --count origin/$PR_HEAD..origin/$PR_BASE 2>/dev/null || echo "0")
      ```

      | Commits Behind | Action                                        |
      | -------------- | --------------------------------------------- |
      | 0-5            | Continue                                      |
      | 6-15           | Warn, suggest rebase, continue                |
      | 16+            | Warn strongly, recommend rebase before review |

      **If significantly behind:**

      ````markdown
      ⚠️ **Branch is {N} commits behind {base}**

      Consider rebasing before review to ensure you're reviewing against current code:

      ```bash
      git fetch origin {base}
      git rebase origin/{base}
      git push --force-with-lease
      ```
      ````

      ````

      ### 2.4 Check Draft Status

      ```bash
      gh pr view {number} --json isDraft --jq '.isDraft'
      ````

      | Status  | Action                                              |
      | ------- | --------------------------------------------------- |
      | `false` | Continue normally                                   |
      | `true`  | Note in scope, continue (user wants early feedback) |

      ### 2.5 Check PR Size

      | Metric        | Warning Threshold | Action                         |
      | ------------- | ----------------- | ------------------------------ |
      | Changed files | 20+               | Warn about review thoroughness |
      | Lines changed | 1000+             | Warn about review thoroughness |

      **If very large:**

      ```markdown
      ⚠️ **Large PR: {files} files, +{additions} -{deletions} lines**

      Large PRs are harder to review thoroughly. Consider splitting into smaller PRs for better review quality.
      ```

      ### 2.6 Compile Reviewability Summary

      ```markdown
      ## Pre-Review Status

      | Check           | Status                                | Notes     |
      | --------------- | ------------------------------------- | --------- |
      | Merge Conflicts | ✅ None / ❌ Has conflicts            | {details} |
      | CI Status       | ✅ Passing / ⚠️ Failing / ⏳ Pending  | {details} |
      | Behind Base     | ✅ Up to date / ⚠️ {N} commits behind | {details} |
      | Draft           | ✅ Ready / 📝 Draft                   | {details} |
      | Size            | ✅ Normal / ⚠️ Large ({N} files)      | {details} |
      ```

      **PHASE_2_CHECKPOINT:**

      - [ ] No merge conflicts (or workflow stopped)
      - [ ] CI status noted
      - [ ] Behind-base status checked
      - [ ] Draft status noted
      - [ ] Size warnings issued if needed

      ---

      ## Phase 3: CONTEXT - Gather Review Context

      ### 3.1 Get Full Diff

      ```bash
      gh pr diff {number}
      ```

      Store this for reference - parallel agents will re-fetch as needed.

      ### 3.2 List Changed Files by Type

      ```bash
      gh pr view {number} --json files --jq '.files[].path'
      ```

      **Categorize files:**

      - Source code (`.ts`, `.js`, `.py`, etc.)
      - Test files (`*.test.ts`, `*.spec.ts`, `test_*.py`)
      - Documentation (`*.md`, `docs/`)
      - Configuration (`.json`, `.yaml`, `.toml`)
      - Types/interfaces

      ### 3.3 Check for CLAUDE.md

      ```bash
      cat CLAUDE.md 2>/dev/null | head -100
      ```

      Note key rules that reviewers should check against.

      ### 3.4 Identify New Abstractions

      Scan the diff for new abstractions introduced by this PR:

      - New interfaces, types, or abstract classes (search diff for `interface `, `type `, `abstract class`)
      - New utility modules or helper files (new `.ts` files that aren't feature files or tests)
      - New configuration keys or schema fields

      For each new abstraction found, note it in the scope manifest under "Review Focus Areas" so the code review agent can verify it doesn't duplicate an existing primitive.

      ```bash
      # Quick scan for new abstractions in diff
      gh pr diff {number} | grep "^+" | sed 's/^+//' | grep -E "(^interface |^export interface |^type |^abstract class |^export class )" | head -20
      ```

      **PHASE_3_CHECKPOINT:**

      - [ ] Diff available
      - [ ] Files categorized by type
      - [ ] CLAUDE.md rules noted
      - [ ] New abstractions scanned

      ---

      ## Phase 3.5: PLAN/ISSUE CONTEXT - Check for Workflow Artifacts

      **CRITICAL**: If this PR was created by a workflow, there will be artifacts that contain important context for reviewers.

      ### 3.5.1 Find Workflow Artifacts

      Check for artifacts from EITHER workflow type:

      ```bash
      # Option 1: Plan-based workflow (rith-plan-to-merge)
      ls -t $ARTIFACTS_DIR/../runs/*/plan-context.md 2>/dev/null | head -1

      # Option 2: Issue-based workflow (rith-fix-github-issue)
      ls -t $ARTIFACTS_DIR/../runs/*/investigation.md 2>/dev/null | head -1
      ```

      ### 3.5.2 Extract Scope Limits

      **If plan-context.md exists** (from plan workflow):

      ```bash
      # Extract the NOT Building section
      sed -n '/## NOT Building/,/^## /p' $ARTIFACTS_DIR/../runs/*/plan-context.md | head -30
      ```

      **If investigation.md exists** (from issue workflow):

      ```bash
      # Extract the Scope Boundaries / OUT OF SCOPE section
      sed -n '/## Scope Boundaries/,/^## /p' $ARTIFACTS_DIR/../runs/*/investigation.md | head -30
      ```

      **These are INTENTIONAL exclusions** - do NOT flag them as bugs or missing features!

      ### 3.5.3 Check Implementation Report

      ```bash
      # Look for implementation report (either workflow)
      ls -t $ARTIFACTS_DIR/../runs/*/implementation.md 2>/dev/null | head -1
      ```

      **If implementation.md exists**, note any deviations:

      ```bash
      # Extract deviations section
      sed -n '/## Deviations/,/^## /p' $ARTIFACTS_DIR/../runs/*/implementation.md | head -20
      ```

      **PHASE_3.5_CHECKPOINT:**

      - [ ] Workflow artifacts checked (plan-context.md OR investigation.md)
      - [ ] Scope limits extracted (NOT Building OR OUT OF SCOPE)
      - [ ] Implementation deviations noted (if available)

      ---

      ## Phase 4: PREPARE - Create Artifacts Directory

      ### 4.1 Create Directory Structure

      ```bash
      mkdir -p $ARTIFACTS_DIR/review
      ```

      ### 4.2 Clean Stale Artifacts

      ```bash
      # Remove review directories older than 7 days
      find $ARTIFACTS_DIR/../reviews/pr-* -maxdepth 0 -mtime +7 -exec rm -rf {} \; 2>/dev/null || true
      ```

      ### 4.3 Create Scope Manifest

      Write `$ARTIFACTS_DIR/review/scope.md`:

      ```markdown
      # PR Review Scope: #{number}

      **Title**: {PR title}
      **URL**: {PR URL}
      **Branch**: {head} → {base}
      **Author**: {author}
      **Date**: {ISO timestamp}

      ---

      ## Pre-Review Status

      | Check           | Status   | Notes                        |
      | --------------- | -------- | ---------------------------- |
      | Merge Conflicts | {status} | {details}                    |
      | CI Status       | {status} | {passing}/{total} checks     |
      | Behind Base     | {status} | {N} commits behind           |
      | Draft           | {status} | {Ready/Draft}                |
      | Size            | {status} | {files} files, +{add}/-{del} |

      ---

      ## Changed Files

      | File               | Type   | Additions | Deletions |
      | ------------------ | ------ | --------- | --------- |
      | `src/file.ts`      | source | +10       | -5        |
      | `src/file.test.ts` | test   | +20       | -0        |
      | ...                | ...    | ...       | ...       |

      **Total**: {changedFiles} files, +{additions} -{deletions}

      ---

      ## File Categories

      ### Source Files ({count})

      - `src/...`

      ### Test Files ({count})

      - `src/...test.ts`

      ### Documentation ({count})

      - `$DOCS_DIR/...`
      - `README.md`

      ### Configuration ({count})

      - `package.json`

      ---

      ## Review Focus Areas

      Based on changes, reviewers should focus on:

      1. **Code Quality**: {list key source files}
      2. **Error Handling**: {files with try/catch, error handling}
      3. **Test Coverage**: {new functionality needing tests}
      4. **Comments/Docs**: {files with documentation changes}
      5. **Docs Impact**: {check if CLAUDE.md or $DOCS_DIR need updates}
      6. **Primitive Alignment**: {If new abstractions found: list them} — verify no duplication of existing primitives

      ---

      ## CLAUDE.md Rules to Check

      {Extract key rules from CLAUDE.md that apply to this PR}

      ---

      ## Workflow Context (if from automated workflow)

      {If plan-context.md OR investigation.md was found:}

      ### Scope Limits (NOT Building / OUT OF SCOPE)

      **CRITICAL FOR REVIEWERS**: These items are **intentionally excluded** from scope. Do NOT flag them as bugs or missing features.

      {From plan-context.md "NOT Building" section OR investigation.md "Scope Boundaries/OUT OF SCOPE" section}

      **IN SCOPE:**

      - {what we're changing}

      **OUT OF SCOPE (do not touch):**

      - {Explicit exclusion 1 with rationale}
      - {Explicit exclusion 2 with rationale}

      ### Implementation Deviations

      {If implementation.md was found and has deviations:}

      {Copy the "Deviations" section from implementation.md}

      {If no workflow artifacts found:}

      _No workflow artifacts found - this appears to be a manual PR._

      ---

      ## CI Details

      {If CI failing, list which checks failed}

      ---

      ## Metadata

      - **Scope created**: {ISO timestamp}
      - **Artifact path**: `$ARTIFACTS_DIR/review/`
      ```

      **PHASE_4_CHECKPOINT:**

      - [ ] Directory created
      - [ ] Stale artifacts cleaned
      - [ ] Scope manifest written with pre-review status

      ---

      ## Phase 5: OUTPUT - Report to User

      ### If Blocked (Conflicts)

      ````markdown
      ## ❌ Review Blocked: Merge Conflicts

      **PR**: #{number} - {title}

      This PR has merge conflicts that must be resolved before review.

      ### To Resolve

      ```bash
      git fetch origin {base}
      git checkout {head}
      git rebase origin/{base}
      # Resolve conflicts in your editor
      git add .
      git rebase --continue
      git push --force-with-lease
      ```
      ````

      Then re-request the review: `@rith review this PR`

      ````

      ### If Proceeding

      ```markdown
      ## PR Review Scope Complete

      **PR**: #{number} - {title}
      **Files**: {count} changed (+{additions} -{deletions})

      ### Pre-Review Status
      | Check | Status |
      |-------|--------|
      | Conflicts | ✅ None |
      | CI | {✅ Passing / ⚠️ {N} failing} |
      | Behind Base | {✅ Up to date / ⚠️ {N} behind} |
      | Draft | {✅ Ready / 📝 Draft} |
      | Size | {✅ Normal / ⚠️ Large} |

      ### File Categories
      - Source: {count} files
      - Tests: {count} files
      - Docs: {count} files
      - Config: {count} files

      ### Artifacts Directory
      `$ARTIFACTS_DIR/review/`

      ### Next Step
      Launching 5 parallel review agents...
      ````

      ---

      ## Success Criteria

      - **PR_IDENTIFIED**: Valid open PR found
      - **NO_CONFLICTS**: Merge conflicts block workflow
      - **CONTEXT_GATHERED**: Diff and file list available
      - **ARTIFACTS_DIR_CREATED**: Directory structure exists
      - **SCOPE_MANIFEST_WRITTEN**: `scope.md` file created with pre-review status

    depends_on: [verify-pr-base]
    context: fresh


name: rith-plan-to-pr
description: |
  Use when: You have an existing implementation plan and want to execute it end-to-end.
  Input: Path to a plan file ($ARTIFACTS_DIR/plan.md or .agents/plans/*.md)
  Output: PR ready for merge with comprehensive review completed

  Full workflow:
  1. Read plan, setup branch, extract scope limits
  2. Verify plan research is still valid
  3. Implement all tasks with type-checking
  4. Run full validation suite
  5. Create PR with template, mark ready
  6. Comprehensive code review (5 parallel agents with scope limit awareness)
  7. Synthesize and fix review findings
  8. Final summary with decision matrix -> GitHub comment + follow-up recommendations

  NOT for: Creating plans from scratch (use rith-idea-to-pr), quick fixes, standalone reviews.

nodes:
  # ═══════════════════════════════════════════════════════════════════
  # PHASE 1: SETUP
  # ═══════════════════════════════════════════════════════════════════

  - id: plan-setup
    bash: |
      set -euo pipefail

      # Locate plan file
      if [ -f "$ARTIFACTS_DIR/plan.md" ]; then
        PLAN_PATH="$ARTIFACTS_DIR/plan.md"
        echo "Using plan from workflow: $PLAN_PATH"
      elif [ -n "${ARGUMENTS:-}" ] && [ -f "${ARGUMENTS:-}" ]; then
        PLAN_PATH="$ARGUMENTS"
        echo "Using plan from arguments: $PLAN_PATH"
      else
        echo "ERROR: No plan found"
        exit 1
      fi

      echo "PLAN_PATH=$PLAN_PATH"

      # Git state
      git branch --show-current
      git status --porcelain
      git remote get-url origin
      gh repo view --json nameWithOwner -q .nameWithOwner

      # Fetch and sync
      git fetch origin
    skills: [rith-plan-setup]
    prompt: |
      Prepare the plan context for implementation. Plan path: $ARGUMENTS
    context: fresh

  # ═══════════════════════════════════════════════════════════════════
  # PHASE 2: CONFIRM PLAN
  # ═══════════════════════════════════════════════════════════════════

  - id: confirm-plan
    skills: [rith-create-plan]
    prompt: |
      This is the plan confirmation step. Verify that the plan's research is still valid
      and patterns referenced in the plan still exist in the codebase.
      Use references/plan-confirmation.md for the confirmation process.
    depends_on: [plan-setup]
    context: fresh

  # ═══════════════════════════════════════════════════════════════════
  # PHASE 3: IMPLEMENT
  # ═══════════════════════════════════════════════════════════════════

  - id: implement-tasks
    skills: [rith-implement]
    prompt: |
      Execute task list only without full environment setup.
    depends_on: [confirm-plan]
    context: fresh
    model: anthropic/claude-opus-4-5

  # ═══════════════════════════════════════════════════════════════════
  # PHASE 4: VALIDATE
  # ═══════════════════════════════════════════════════════════════════

  - id: validate
    skills: [rith-validate]
    depends_on: [implement-tasks]
    context: fresh

  # ═══════════════════════════════════════════════════════════════════
  # PHASE 5: FINALIZE PR
  # ═══════════════════════════════════════════════════════════════════

  - id: finalize-pr
    skills: [rith-finalize-pr]
    depends_on: [validate]
    context: fresh

  # ═══════════════════════════════════════════════════════════════════
  # PHASE 6: CODE REVIEW
  # ═══════════════════════════════════════════════════════════════════

  - id: verify-pr-base
    bash: |
      set -euo pipefail
      EXPECTED="$BASE_BRANCH"
      ACTUAL=$(gh pr view --json baseRefName -q '.baseRefName')
      if [ "$ACTUAL" != "$EXPECTED" ]; then
        PR_NUMBER=$(gh pr view --json number -q '.number')
        echo "Base mismatch on PR #$PR_NUMBER: expected=$EXPECTED actual=$ACTUAL — re-targeting" >&2
        gh pr edit "$PR_NUMBER" --base "$EXPECTED"
      else
        echo "PR base verified: $EXPECTED"
      fi
    depends_on: [finalize-pr]

  - id: review-scope
    bash: |
      set -euo pipefail

      # Determine PR number
      if [ -f "$ARTIFACTS_DIR/.pr-number" ]; then
        PR_NUMBER=$(cat "$ARTIFACTS_DIR/.pr-number" | tr -d '\n' | tr -d ' ')
        if ! echo "$PR_NUMBER" | grep -qE '^[0-9]+$'; then
          PR_NUMBER=""
        fi
      fi

      if [ -z "${PR_NUMBER:-}" ] && [ -n "${ARGUMENTS:-}" ]; then
        PR_NUMBER=$(echo "$ARGUMENTS" | grep -oE '[0-9]+' | head -1)
      fi

      if [ -z "${PR_NUMBER:-}" ]; then
        PR_NUMBER=$(gh pr view --json number -q '.number' 2>/dev/null || true)
      fi

      if [ -z "${PR_NUMBER:-}" ]; then
        echo "ERROR: No PR number found"
        exit 1
      fi

      echo "$PR_NUMBER" > "$ARTIFACTS_DIR/.pr-number"
      echo "PR_NUMBER=$PR_NUMBER"

      # Create review artifacts directory
      mkdir -p "$ARTIFACTS_DIR/review"

      # Clean stale review artifacts
      find "$ARTIFACTS_DIR/../reviews/pr-"* -maxdepth 0 -mtime +7 -exec rm -rf {} \; 2>/dev/null || true
    skills: [rith-pr-review-scope]
    prompt: |
      Assess reviewability and create scope manifest for the PR.
    depends_on: [verify-pr-base]
    context: fresh

  - id: sync
    skills: [rith-sync-pr-with-main]
    depends_on: [review-scope]
    context: fresh

  - id: code-review
    skills: [rith-code-review]
    depends_on: [sync]
    context: fresh

  - id: error-handling
    skills: [rith-error-handling-review]
    depends_on: [sync]
    context: fresh

  - id: test-coverage
    skills: [rith-test-coverage-review]
    depends_on: [sync]
    context: fresh

  - id: comment-quality
    skills: [rith-comment-quality-review]
    depends_on: [sync]
    context: fresh

  - id: docs-impact
    skills: [rith-docs-impact-review]
    depends_on: [sync]
    context: fresh

  - id: synthesize
    skills: [rith-synthesize-review]
    depends_on: [code-review, error-handling, test-coverage, comment-quality, docs-impact]
    trigger_rule: one_success
    context: fresh

  # ═══════════════════════════════════════════════════════════════════
  # PHASE 7: FIX REVIEW ISSUES
  # ═══════════════════════════════════════════════════════════════════

  - id: implement-fixes
    skills: [rith-implement-review-fixes]
    depends_on: [synthesize]
    context: fresh

  # ═══════════════════════════════════════════════════════════════════
  # PHASE 8: FINAL SUMMARY & FOLLOW-UP
  # ═══════════════════════════════════════════════════════════════════

  - id: workflow-summary
    skills: [rith-workflow-summary]
    prompt: |
      Produce the final workflow completion report.
    depends_on: [implement-fixes]
    context: fresh

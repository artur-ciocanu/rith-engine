# E2E smoke test — mixed models in same workflow
# Verifies: per-node model override, cross-node $nodeId.output refs
name: e2e-mixed-providers
description: "Tests different models in the same workflow with cross-node output refs."

model: haiku

nodes:
  # 1. Default model node
  - id: claude-node
    prompt: "Say 'claude-ok' and nothing else."
    allowed_tools: []
    idle_timeout: 30000

  # 2. Different model node (runs parallel, different model)
  - id: codex-node
    prompt: "Say 'codex-ok' and nothing else."
    model: gpt-5.2
    idle_timeout: 30000

  # 3. Assert both nodes returned output
  - id: assert
    bash: |
      claude_out="$claude-node.output"
      codex_out="$codex-node.output"
      if [ -z "$claude_out" ]; then
        echo "FAIL: claude-node returned empty output"
        exit 1
      fi
      if [ -z "$codex_out" ]; then
        echo "FAIL: codex-node returned empty output"
        exit 1
      fi
      echo "PASS: claude=$claude_out codex=$codex_out"
    depends_on: [claude-node, codex-node]

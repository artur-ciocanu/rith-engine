# =============================================================================
# Rith Engine - Docker Compose for End Users (pre-built image)
# =============================================================================
# NOTE: This compose file was designed for the server/web-UI era. Rith is now
# a CLI-only workflow engine. The port mappings and healthcheck need reworking
# for CLI-only usage. Volumes and database config remain useful as-is.
# =============================================================================
# Usage:
#   1. Copy this file and .env.example to your server
#   2. Rename .env.example to .env and configure
#   3. Run: docker compose up -d
#
# For full documentation, see:
# https://github.com/artur-ciocanu/rith-engine

services:
  app:
    image: ghcr.io/artur-ciocanu/rith-engine:latest
    restart: unless-stopped
    env_file: .env
    environment:
      RITH_DOCKER: "true"
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    volumes:
      - ${RITH_DATA:-rith_data}:/.rith
      - ${RITH_USER_HOME:-rith_user_home}:/home/appuser
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${PORT:-3000}/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # Uncomment to run PostgreSQL locally
  # postgres:
  #   image: postgres:17-alpine

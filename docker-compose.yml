# =============================================================================
# Rith Engine - Docker Compose
# =============================================================================
# NOTE: This compose file was designed for the server/web-UI era. Rith is now
# a CLI-only workflow engine. The port mappings, healthcheck, Caddy reverse
# proxy, and auth-service sections need reworking for CLI-only usage.
# The volumes, networks, and PostgreSQL profile remain useful as-is.
# =============================================================================
#
# Usage:
#   docker compose up -d                                  # App with SQLite (default)
#   docker compose --profile with-db up -d                # App + local PostgreSQL
#
# Database:
#   SQLite is the default (zero config). For PostgreSQL, either:
#   - Use --profile with-db for a local container, and set in .env:
#     DATABASE_URL=postgresql://postgres:postgres@postgres:5432/remote_coding_agent
#   - Or point DATABASE_URL to an external database (Supabase, Neon, etc.)
#
# Data:
#   Set RITH_DATA in .env to control where Rith Engine stores data on the host:
#     RITH_DATA=/opt/rith-data    # Any absolute path on the host
#   Default: Docker-managed volume (rith_data)
#
# User home (Claude/Codex/Pi config, gitconfig, shell history):
#   /home/appuser is persisted by default to the rith_user_home named volume so
#   user-installed Claude Code skills/commands/agents/hooks, Codex/Pi auth state,
#   and ~/.gitconfig survive container rebuilds. To use a host path instead:
#     RITH_USER_HOME=/opt/rith-user-home    # Any absolute path on the host
#   Default: Docker-managed volume (rith_user_home)
#

services:
  # -------------------------------------------------------------------------
  # App (always runs)
  # -------------------------------------------------------------------------
  app:
    build: .
    image: rith-engine
    env_file: .env
    environment:
      RITH_DOCKER: "true"
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    volumes:
      - ${RITH_DATA:-rith_data}:/.rith
      - ${RITH_USER_HOME:-rith_user_home}:/home/appuser
    networks:
      - rith-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${PORT:-3000}/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    dns:
      - 8.8.8.8
      - 8.8.4.4
    sysctls:
      - net.ipv6.conf.all.disable_ipv6=1

  # -------------------------------------------------------------------------
  # PostgreSQL (optional: --profile with-db)
  # Set DATABASE_URL in .env to connect the app to this container.
  # -------------------------------------------------------------------------
  postgres:
    image: postgres:17-alpine
    profiles: ["with-db"]
    environment:
      POSTGRES_DB: remote_coding_agent
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations/000_combined.sql:/docker-entrypoint-initdb.d/000_combined.sql:ro
      - ./migrations:/migrations:ro
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    networks:
      - rith-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # -------------------------------------------------------------------------
  # Caddy reverse proxy with automatic HTTPS (optional: --profile cloud)
  # Requires DOMAIN set in .env. See Caddyfile for configuration.
  # -------------------------------------------------------------------------
  caddy:
    image: caddy:2-alpine
    profiles: ["cloud"]
    restart: unless-stopped
    env_file: .env
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - rith-network
    depends_on:
      app:
        condition: service_healthy

  # -------------------------------------------------------------------------
  # Auth service — form-based login for Caddy forward_auth (optional: --profile auth)
  # Use alongside --profile cloud: docker compose --profile cloud --profile auth up -d
  # Requires AUTH_USERNAME, AUTH_PASSWORD_HASH, COOKIE_SECRET in .env.
  # See docs/docker.md for setup instructions.
  # -------------------------------------------------------------------------
  auth-service:
    build: ./auth-service
    profiles: ["auth"]
    restart: unless-stopped
    env_file: .env
    environment:
      AUTH_PORT: "${AUTH_SERVICE_PORT:-9000}"
    expose:
      - "${AUTH_SERVICE_PORT:-9000}"
    networks:
      - rith-network

volumes:
  rith_data:
  rith_user_home:
  postgres_data:
  caddy_data:
  caddy_config:

networks:
  rith-network:
    driver: bridge
